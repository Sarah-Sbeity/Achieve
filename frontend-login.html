<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Platform – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #eaf2ff;
        background:
          radial-gradient(1000px 500px at 20% 20%, rgba(120,190,255,.55), transparent 60%),
          radial-gradient(900px 600px at 85% 15%, rgba(120,140,255,.50), transparent 55%),
          linear-gradient(180deg, #0b3f8a, #041b3f);
      }

      .card {
        width: min(420px, 92vw);
        padding: 28px;
        border-radius: 22px;
        background: rgba(255,255,255,.12);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,.25);
        box-shadow: 0 24px 60px rgba(0,0,0,.35);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
      }

      .subtitle {
        margin-bottom: 20px;
        font-size: 0.95rem;
        opacity: 0.85;
      }

      label {
        font-size: 0.85rem;
        margin-bottom: 6px;
        display: block;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.25);
        background: rgba(2,6,23,.45);
        color: #fff;
        outline: none;
      }

      input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 2px rgba(56,189,248,.3);
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: white;
        font-weight: 700;
        cursor: pointer;
        margin-top: 6px;
      }

      .signup-text {
        margin-top: 14px;
        text-align: center;
        font-size: 0.9rem;
        opacity: 0.85;
      }

      .signup-text a {
        color: #7dd3fc;
        font-weight: 600;
        text-decoration: none;
      }

      .signup-text a:hover {
        text-decoration: underline;
      }

      .status {
        margin-top: 12px;
        font-size: 0.9rem;
        min-height: 1.2em;
      }

      .status.error { color: #fecaca; }
      .status.success { color: #bbf7d0; }

      pre {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(2,6,23,.5);
        font-size: 0.8rem;
        display: none;
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1 id="title">Login</h1>
      <p class="subtitle">Access dashboards and reports</p>

      <form id="form">
        <label>Email</label>
        <input id="email" type="email" required />

        <label>Password</label>
        <input id="password" type="password" required />

        <button id="submitBtn" type="submit">Sign in</button>
      </form>

      <p class="signup-text">
        <span id="toggleText">Not a user?</span>
        <a href="#" id="toggleLink">Sign up</a>
      </p>
      

      <div id="status" class="status"></div>
      <pre id="output"></pre>
    </div>

    <script>
      const API_BASE = "http://localhost:3000";

      const form = document.getElementById("form");
      const title = document.getElementById("title");
      const submitBtn = document.getElementById("submitBtn");
      const signupLink = document.getElementById("signupLink");
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");

      let mode = "login";

      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = "status " + (type || "");
      }

      const toggleText = document.getElementById("toggleText");
const toggleLink = document.getElementById("toggleLink");

toggleLink.addEventListener("click", (e) => {
  e.preventDefault();

  if (mode === "login") {
    mode = "signup";
    title.textContent = "Sign up";
    submitBtn.textContent = "Create account";
    toggleText.textContent = "Already have an account?";
    toggleLink.textContent = "Log in";
  } else {
    mode = "login";
    title.textContent = "Login";
    submitBtn.textContent = "Sign in";
    toggleText.textContent = "Not a user?";
    toggleLink.textContent = "Sign up";
  }

  setStatus("", "");
});

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = emailInput.value;
        const password = passwordInput.value;

        submitBtn.disabled = true;
        setStatus(mode === "login" ? "Signing in..." : "Creating account...");

        try {
          const res = await fetch(
            API_BASE + (mode === "login" ? "/auth/login" : "/auth/signup"),
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ email, password }),
            }
          );

          const data = await res.json();

          if (!res.ok) {
            setStatus(data.message || "Request failed", "error");
          } else {
            setStatus("Success! Redirecting…", "success");
            outputEl.style.display = "block";
            outputEl.textContent = JSON.stringify(data, null, 2);
            var appBase = window.SURVEY_APP_BASE || "http://localhost:5173";
            setTimeout(function () {
              window.location.href = appBase + "/survey";
            }, 800);
          }
        } catch (err) {
          setStatus("Network error", "error");
        } finally {
          submitBtn.disabled = false;
        }
      });

      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
    </script>
  </body>
</html>
